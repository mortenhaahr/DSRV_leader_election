name: Pyright

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pyright:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pyright
        run: uvx pyright --project pyrightconfig.json
